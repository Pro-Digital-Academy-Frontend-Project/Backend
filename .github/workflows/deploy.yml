name: CI/CD Pipeline for Backend

on:
  push:
    branches:
      - main  # 배포할 브랜치
      - action-test-branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v3

      # Docker와 Docker Compose 설치 (필요한 경우에만 설치)
      - name: Set up Docker
        run: |
          # Docker 설치 (GitHub Actions의 ubuntu-latest 환경에는 기본적으로 Docker가 설치되어 있음)
          if ! command -v docker &> /dev/null; then
            echo "Docker가 설치되어 있지 않습니다. 설치 중..."
            sudo apt-get update
            sudo apt-get install -y docker.io
            sudo systemctl start docker
            sudo systemctl enable docker
          else
            echo "Docker가 이미 설치되어 있습니다."
          fi
          
          # Docker Compose 설치 (설치된 버전 확인 후 필요하면 설치)
          if ! command -v docker-compose &> /dev/null; then
            echo "Docker Compose가 설치되어 있지 않습니다. 설치 중..."
            sudo curl -L "https://github.com/docker/compose/releases/download/1.29.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          else
            echo "Docker Compose가 이미 설치되어 있습니다."
          fi
          
          # docker-compose 설치 확인
          docker-compose --version

      # Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker 이미지를 빌드하고 푸시
      - name: Build and Push Docker Image
        run: |
          docker-compose build express  # express 서비스만 빌드
          docker-compose push express  # 빌드한 express 이미지를 Docker Hub에 푸시

      # 서버에 /server 디렉토리 생성
      - name: Create Server Directory
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /server
            sudo chown ${{ secrets.SERVER_USER }}: ${{ secrets.SERVER_USER }} /server  # 권한 설정 (필요 시)

      # Docker Compose 파일을 서버로 전송
      - name: Copy docker-compose.yml to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "Backend/docker-compose.yml"  # 경로 확인 필요
          target: "/server/docker-compose.yml"

      # 서버에 배포 명령어 실행
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /server
            sudo docker-compose pull express
            sudo docker-compose up -d express