name: CI/CD Pipeline for Backend

on:
  push:
    branches:
      - main  # 배포할 브랜치
      - action-test-branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v3

      # Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker 이미지를 빌드하고 푸시
      - name: Build and Push Docker Image
        run: |
          # Docker Compose로 express 서비스만 빌드
          docker-compose build express
          # 빌드한 express 이미지를 Docker Hub에 푸시
          docker-compose push express

      # 서버에 배포
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 서버에 'server' 디렉토리가 있는지 확인하고, 없으면 생성
            mkdir -p /server  # 서버 루트 디렉토리에 'server' 디렉토리 생성
            # 로컬에서 'docker-compose.yml' 파일을 서버의 'server' 디렉토리로 복사
            cp ./docker-compose.yml /server/docker-compose.yml  # GitHub Actions에서 파일 경로에 맞게 복사
            # 'server' 디렉토리로 이동
            cd /server
            # 최신 이미지를 가져오기 (express 서비스만)
            docker-compose pull express
            # express 서비스 실행
            docker-compose up -d express